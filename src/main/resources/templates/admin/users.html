<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}"><i class="bi bi-shield-check me-2"></i>Admin</a>
        <ul class="navbar-nav ms-auto flex-row gap-3">
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/admin/users}">Users</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/ads}">Ads</a></li>
            <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <h3 class="mb-4"><i class="bi bi-people me-2"></i>User Management</h3>
    <div id="alertContainer"></div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Location</th>
                        <th>Roles</th>
                        <th>Status</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td>
                            <div class="d-flex align-items-center">
                                <i class="bi bi-person-circle fs-4 text-secondary me-2"></i>
                                <span th:text="${user.name}">Name</span>
                            </div>
                        </td>
                        <td th:text="${user.email}">email</td>
                        <td>
                            <span th:text="${user.city + ', ' + user.state}">Location</span>
                        </td>
                        <td>
                            <span th:each="role : ${user.roles}"
                                  th:text="${role}"
                                  th:classappend="${role == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
                                  class="badge me-1">Role</span>
                        </td>
                        <td>
                            <span th:if="${user.active}" class="badge bg-success">Active</span>
                            <span th:unless="${user.active}" class="badge bg-danger">Inactive</span>
                        </td>
                        <td>
                            <small th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'MMM dd, yyyy') : 'N/A'}">Date</small>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger"
                                    th:attr="onclick='deleteUser(\'' + ${user.id} + '\')'">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
async function deleteUser(userId) {
    if (!confirm('Delete this user?')) return;
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/admin/users/' + userId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) location.reload();
    else showAlert('danger', 'Failed to delete user.');
}
</script>
</body>
</html>
