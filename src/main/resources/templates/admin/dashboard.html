<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ClassifiedAds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-shield-check me-2"></i>Admin Panel</a>
        <ul class="navbar-nav ms-auto flex-row gap-3">
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}">Users</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/ads}">Ads</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/reports}">Reports</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/}">Site</a></li>
            <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <h2 class="mb-4">Admin Dashboard</h2>
    <div id="alertContainer"></div>

    <!-- Stats Cards (loaded via JS) -->
    <div class="row g-4 mb-5" id="statsCards">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6>Total Users</h6>
                            <h2 id="totalUsers">-</h2>
                        </div>
                        <i class="bi bi-people display-4 opacity-50"></i>
                    </div>
                </div>
                <div class="card-footer border-0 bg-transparent">
                    <a th:href="@{/admin/users}" class="text-white small">View all &rarr;</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6>Active Ads</h6>
                            <h2 id="activeAds">-</h2>
                        </div>
                        <i class="bi bi-megaphone display-4 opacity-50"></i>
                    </div>
                </div>
                <div class="card-footer border-0 bg-transparent">
                    <a th:href="@{/admin/ads}" class="text-white small">Manage &rarr;</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6>Pending Ads</h6>
                            <h2 id="pendingAds">-</h2>
                        </div>
                        <i class="bi bi-clock display-4 opacity-50"></i>
                    </div>
                </div>
                <div class="card-footer border-0 bg-transparent">
                    <a th:href="@{/admin/ads}" class="text-white small">Review &rarr;</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-danger text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6>Pending Reports</h6>
                            <h2 id="pendingReports">-</h2>
                        </div>
                        <i class="bi bi-flag display-4 opacity-50"></i>
                    </div>
                </div>
                <div class="card-footer border-0 bg-transparent">
                    <a th:href="@{/admin/reports}" class="text-white small">View &rarr;</a>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header d-flex justify-content-between">
                    <h6 class="mb-0">Quick Actions</h6>
                </div>
                <div class="card-body">
                    <div class="d-grid gap-2">
                        <a th:href="@{/admin/ads}" class="btn btn-outline-warning">
                            <i class="bi bi-clock me-2"></i>Review Pending Ads
                        </a>
                        <a th:href="@{/admin/users}" class="btn btn-outline-primary">
                            <i class="bi bi-people me-2"></i>Manage Users
                        </a>
                        <a th:href="@{/admin/reports}" class="btn btn-outline-danger">
                            <i class="bi bi-flag me-2"></i>View Reports
                        </a>
                        <a th:href="@{/swagger-ui.html}" class="btn btn-outline-secondary" target="_blank">
                            <i class="bi bi-code me-2"></i>API Documentation
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
async function loadDashboardStats() {
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/admin/dashboard', {
        headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) {
        const data = await res.json();
        document.getElementById('totalUsers').textContent = data.totalUsers;
        document.getElementById('activeAds').textContent = data.activeAds;
        document.getElementById('pendingAds').textContent = data.pendingAds;
        document.getElementById('pendingReports').textContent = data.pendingReports;
    }
}
loadDashboardStats();
</script>
</body>
</html>
