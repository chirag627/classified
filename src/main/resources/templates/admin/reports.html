<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}"><i class="bi bi-shield-check me-2"></i>Admin</a>
        <ul class="navbar-nav ms-auto flex-row gap-3">
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/ads}">Ads</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/admin/reports}">Reports</a></li>
            <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <h3 class="mb-4"><i class="bi bi-flag me-2"></i>Reports Management</h3>
    <div id="alertContainer"></div>
    <div id="reportsContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">Loading reports...</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
async function loadReports() {
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/admin/reports?status=PENDING&size=50', {
        headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) { document.getElementById('reportsContainer').innerHTML = '<div class="alert alert-danger">Failed to load reports.</div>'; return; }
    const data = await res.json();
    const reports = data.content;
    if (!reports || reports.length === 0) {
        document.getElementById('reportsContainer').innerHTML = '<div class="text-center py-5"><i class="bi bi-check-circle text-success display-4"></i><p class="text-muted mt-2">No pending reports!</p></div>';
        return;
    }
    let html = '<div class="card"><div class="card-body p-0"><table class="table table-hover mb-0"><thead class="table-dark"><tr><th>Reporter</th><th>Ad ID</th><th>Reason</th><th>Description</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
    reports.forEach(r => {
        html += `<tr>
            <td>${r.reporterId || 'Unknown'}</td>
            <td><a href="/ads/${r.adId}" target="_blank">${r.adId}</a></td>
            <td><span class="badge bg-warning text-dark">${r.reason}</span></td>
            <td><small>${r.description || '-'}</small></td>
            <td><small>${r.createdAt ? new Date(r.createdAt).toLocaleDateString() : ''}</small></td>
            <td>
                <button class="btn btn-sm btn-success me-1" onclick="updateReport('${r.id}', 'REVIEWED')">Reviewed</button>
                <button class="btn btn-sm btn-secondary" onclick="updateReport('${r.id}', 'DISMISSED')">Dismiss</button>
            </td>
        </tr>`;
    });
    html += '</tbody></table></div></div>';
    document.getElementById('reportsContainer').innerHTML = html;
}

async function updateReport(id, status) {
    const token = localStorage.getItem('jwt_token');
    const res = await fetch(`/api/admin/reports/${id}/status?status=${status}`, {
        method: 'PUT', headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) { showAlert('success', 'Report updated!'); loadReports(); }
    else showAlert('danger', 'Failed to update report.');
}

loadReports();
</script>
</body>
</html>
