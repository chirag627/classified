<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}"><i class="bi bi-shield-check me-2"></i>Admin</a>
        <ul class="navbar-nav ms-auto flex-row gap-3">
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}">Users</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/admin/ads}">Ads</a></li>
            <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <h3 class="mb-4"><i class="bi bi-megaphone me-2"></i>Ad Management</h3>
    <div id="alertContainer"></div>

    <!-- Pending Ads Section -->
    <div class="card mb-4">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0"><i class="bi bi-clock me-2"></i>Pending Approval
                (<span th:text="${#lists.size(pendingAds)}">0</span>)
            </h5>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(pendingAds)}" class="text-center py-4">
                <i class="bi bi-check-circle text-success display-4"></i>
                <p class="text-muted mt-2">No pending ads. All caught up!</p>
            </div>
            <div class="table-responsive" th:unless="${#lists.isEmpty(pendingAds)}">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr><th>Title</th><th>Category</th><th>Price</th><th>Seller</th><th>Posted</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="ad : ${pendingAds}">
                        <td>
                            <a th:href="@{/ads/{id}(id=${ad.id})}" target="_blank" th:text="${ad.title}" class="fw-medium">Title</a>
                        </td>
                        <td th:text="${ad.categoryName}">Category</td>
                        <td class="text-primary fw-bold">$<span th:text="${#numbers.formatDecimal(ad.price, 1, 2)}">0</span></td>
                        <td th:text="${ad.userName}">Seller</td>
                        <td><small th:text="${ad.createdAt != null ? #temporals.format(ad.createdAt, 'MMM dd') : ''}">Date</small></td>
                        <td>
                            <button class="btn btn-sm btn-success me-1" th:attr="onclick='approveAd(\'' + ${ad.id} + '\')'">
                                <i class="bi bi-check me-1"></i>Approve
                            </button>
                            <button class="btn btn-sm btn-danger" th:attr="onclick='rejectAd(\'' + ${ad.id} + '\')'">
                                <i class="bi bi-x me-1"></i>Reject
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Active Ads Section -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-check-circle me-2"></i>Active Ads
                (<span th:text="${#lists.size(activeAds)}">0</span>)
            </h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr><th>Title</th><th>Category</th><th>Price</th><th>Seller</th><th>Views</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="ad : ${activeAds}">
                        <td>
                            <a th:href="@{/ads/{id}(id=${ad.id})}" target="_blank" th:text="${ad.title}">Title</a>
                        </td>
                        <td th:text="${ad.categoryName}">Category</td>
                        <td>$<span th:text="${#numbers.formatDecimal(ad.price, 1, 2)}">0</span></td>
                        <td th:text="${ad.userName}">Seller</td>
                        <td th:text="${ad.views}">0</td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" th:attr="onclick='adminDeleteAd(\'' + ${ad.id} + '\')'">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
async function approveAd(adId) {
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/admin/ads/' + adId + '/approve', {
        method: 'PUT', headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) { showAlert('success', 'Ad approved!'); setTimeout(() => location.reload(), 1000); }
    else showAlert('danger', 'Failed to approve ad.');
}
async function rejectAd(adId) {
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/admin/ads/' + adId + '/reject', {
        method: 'PUT', headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) { showAlert('success', 'Ad rejected.'); setTimeout(() => location.reload(), 1000); }
    else showAlert('danger', 'Failed to reject ad.');
}
async function adminDeleteAd(adId) {
    if (!confirm('Delete this ad?')) return;
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/ads/' + adId, {
        method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) location.reload();
}
</script>
</body>
</html>
