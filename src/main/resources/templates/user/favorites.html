<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites - ClassifiedAds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-grid-3x3-gap-fill me-2"></i>ClassifiedAds</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a></li>
            <li class="nav-item"><button class="btn btn-outline-light btn-sm ms-1" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <h3 class="mb-4"><i class="bi bi-heart-fill text-danger me-2"></i>Saved Ads</h3>
    
    <div th:if="${#lists.isEmpty(favorites)}" class="text-center py-5">
        <i class="bi bi-heart display-4 text-muted"></i>
        <p class="text-muted mt-3">No saved ads yet. Browse ads and save ones you like!</p>
        <a th:href="@{/ads}" class="btn btn-primary">Browse Ads</a>
    </div>

    <div class="row g-3" th:unless="${#lists.isEmpty(favorites)}">
        <div class="col-md-6 col-lg-4" th:each="ad : ${favorites}">
            <div class="card h-100 ad-card">
                <div class="position-relative">
                    <img th:src="${!#lists.isEmpty(ad.images) ? ad.images[0] : 'https://via.placeholder.com/300x200?text=No+Image'}"
                         class="card-img-top ad-thumb" alt="Ad">
                </div>
                <div class="card-body">
                    <h6 class="card-title text-truncate" th:text="${ad.title}">Title</h6>
                    <p class="text-primary fw-bold mb-1">
                        $<span th:text="${#numbers.formatDecimal(ad.price, 1, 2)}">0.00</span>
                    </p>
                    <small class="text-muted">
                        <i class="bi bi-geo-alt me-1"></i>
                        <span th:text="${ad.location?.city + ', ' + ad.location?.state}">Location</span>
                    </small>
                </div>
                <div class="card-footer bg-transparent d-flex gap-2">
                    <a th:href="@{/ads/{id}(id=${ad.id})}" class="btn btn-outline-primary btn-sm flex-grow-1">View</a>
                    <button class="btn btn-outline-danger btn-sm"
                            th:attr="onclick='removeFavorite(\'' + ${ad.id} + '\')'">
                        <i class="bi bi-heart-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
async function removeFavorite(adId) {
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/favorites/' + adId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) location.reload();
}
</script>
</body>
</html>
