<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Ads - OLXAds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body style="background:#f7f8fa;">

<div id="alertContainer"></div>

<nav class="olx-navbar navbar" style="padding:10px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span style="color:#ffce32;font-weight:900;font-size:1.5rem;letter-spacing:-1px;">OLX</span><span style="color:white;font-size:1.1rem;font-weight:600;">Ads</span>
        </a>
        <ul class="navbar-nav ms-auto flex-row gap-3 align-items-center">
            <li class="nav-item"><a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a></li>
            <li class="nav-item"><button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 style="font-weight:700;"><i class="bi bi-heart-fill text-danger me-2"></i>Saved Ads</h3>
        <a th:href="@{/user/dashboard}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
        </a>
    </div>

    <div th:if="${#lists.isEmpty(favorites)}"
         style="background:white;border-radius:10px;border:1px solid #e0e0e0;padding:60px;text-align:center;">
        <i class="bi bi-heart" style="font-size:3rem;color:#ccc;"></i>
        <h5 style="margin-top:16px;color:#888;">No Saved Ads Yet</h5>
        <p style="color:#aaa;font-size:14px;">Browse ads and tap the heart icon to save ones you like!</p>
        <a th:href="@{/ads}" class="btn btn-primary">
            <i class="bi bi-search me-2"></i>Browse Ads
        </a>
    </div>

    <div class="row g-3" th:unless="${#lists.isEmpty(favorites)}">
        <div class="col-6 col-md-4 col-lg-3" th:each="ad : ${favorites}">
            <div style="background:white;border-radius:8px;border:1px solid #e0e0e0;overflow:hidden;position:relative;">
                <button class="btn btn-sm"
                        th:attr="onclick='removeFavorite(\'' + ${ad.id} + '\')'"
                        style="position:absolute;top:8px;right:8px;z-index:10;background:rgba(255,255,255,0.9);border:none;color:#dc3545;border-radius:50%;width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15);"
                        title="Remove from saved">
                    <i class="bi bi-heart-fill"></i>
                </button>
                <a th:href="@{/ads/{id}(id=${ad.id})}" class="ad-card" style="border:none;border-radius:0;">
                    <div class="position-relative">
                        <img th:src="${!#lists.isEmpty(ad.images) ? ad.images[0] : 'https://via.placeholder.com/300x200?text=No+Image'}"
                             class="ad-thumb" alt="Ad"
                             onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                    </div>
                    <div class="ad-body">
                        <div class="ad-price">₹ <span th:text="${#numbers.formatDecimal(ad.price, 1, 0)}">0</span></div>
                        <div class="ad-title" th:text="${ad.title}">Title</div>
                        <div class="ad-meta">
                            <span><i class="bi bi-geo-alt"></i> <span th:text="${ad.location?.city}">City</span></span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="olx-footer">
    <div class="container">
        <p class="footer-bottom text-center mb-0">&copy; 2024 OLXAds. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
async function removeFavorite(adId) {
    const token = localStorage.getItem('jwt_token');
    if (!token) { window.location.href = '/auth/login'; return; }
    try {
        const res = await fetch('/api/favorites/' + adId, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok || res.status === 204) {
            showAlert('success', '💔 Ad removed from saved ads.');
            setTimeout(() => location.reload(), 1000);
        } else {
            showAlert('danger', '❌ Failed to remove from saved ads. Please try again.');
        }
    } catch (e) {
        showAlert('danger', '⚠️ Connection error. Please try again.');
    }
}
</script>
</body>
</html>
