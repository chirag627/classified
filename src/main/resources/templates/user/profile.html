<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - OLXAds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body style="background:#f7f8fa;">

<div id="alertContainer"></div>

<nav class="olx-navbar navbar" style="padding:10px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span style="color:#ffce32;font-weight:900;font-size:1.5rem;letter-spacing:-1px;">OLX</span><span style="color:white;font-size:1.1rem;font-weight:600;">Ads</span>
        </a>
        <ul class="navbar-nav ms-auto flex-row gap-3 align-items-center">
            <li class="nav-item"><a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a></li>
            <li class="nav-item"><button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h3 style="font-weight:700;margin-bottom:20px;"><i class="bi bi-gear me-2"></i>Profile Settings</h3>

            <!-- Personal Info Card -->
            <div style="background:white;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:20px;">
                <div style="background:#f7f8fa;padding:14px 20px;border-bottom:1px solid #e0e0e0;">
                    <h6 style="margin:0;font-weight:700;">Personal Information</h6>
                </div>
                <div style="padding:20px;">
                    <form id="profileForm">
                        <input type="hidden" id="userId" th:value="${user?.id}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Full Name</label>
                            <input type="text" class="form-control" id="name" th:value="${user?.name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Email</label>
                            <input type="email" class="form-control" th:value="${user?.email}" readonly style="background:#f5f5f5;cursor:not-allowed;">
                            <small class="text-muted">Email address cannot be changed</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" th:value="${user?.phone}" placeholder="e.g. 9876543210">
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">City</label>
                                <input type="text" class="form-control" id="city" th:value="${user?.city}" placeholder="e.g. Mumbai">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">State</label>
                                <input type="text" class="form-control" id="state" th:value="${user?.state}" placeholder="e.g. Maharashtra">
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Save Changes
                            </button>
                            <a th:href="@{/user/dashboard}" class="btn btn-outline-secondary ms-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Change Password Card -->
            <div style="background:white;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;">
                <div style="background:#f7f8fa;padding:14px 20px;border-bottom:1px solid #e0e0e0;">
                    <h6 style="margin:0;font-weight:700;"><i class="bi bi-shield-lock me-2"></i>Change Password</h6>
                </div>
                <div style="padding:20px;">
                    <form id="passwordForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Current Password</label>
                            <input type="password" class="form-control" id="oldPassword" placeholder="Enter current password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">New Password</label>
                            <input type="password" class="form-control" id="newPassword" placeholder="Enter new password (min. 6 chars)">
                        </div>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-lock me-2"></i>Update Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="olx-footer">
    <div class="container">
        <p class="footer-bottom text-center mb-0">&copy; 2024 OLXAds. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
document.getElementById('profileForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const token = localStorage.getItem('jwt_token');
    if (!token) { window.location.href = '/auth/login'; return; }
    const btn = this.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
    const userId = document.getElementById('userId').value;
    const data = {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        city: document.getElementById('city').value.trim(),
        state: document.getElementById('state').value.trim()
    };
    try {
        const res = await fetch('/api/auth/profile/' + userId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            showAlert('success', '✅ Profile updated successfully!');
        } else {
            const err = await res.json();
            showAlert('danger', '❌ ' + (err.error || 'Failed to update profile. Please try again.'));
        }
    } catch (e) {
        showAlert('danger', '⚠️ Connection error. Please try again.');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Save Changes';
});

document.getElementById('passwordForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const token = localStorage.getItem('jwt_token');
    const userId = document.getElementById('userId').value;
    const oldPassword = document.getElementById('oldPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    if (!oldPassword || !newPassword) {
        showAlert('warning', '⚠️ Please fill in both password fields.');
        return;
    }
    if (newPassword.length < 6) {
        showAlert('warning', '⚠️ New password must be at least 6 characters long.');
        return;
    }
    const btn = this.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Updating...';
    try {
        const res = await fetch('/api/auth/password/' + userId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ oldPassword, newPassword })
        });
        if (res.ok) {
            showAlert('success', '✅ Password updated successfully!');
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
        } else {
            const err = await res.json();
            showAlert('danger', '❌ ' + (err.error || 'Failed to update password. Check your current password.'));
        }
    } catch (e) {
        showAlert('danger', '⚠️ Connection error. Please try again.');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-lock me-2"></i>Update Password';
});
</script>
</body>
</html>
