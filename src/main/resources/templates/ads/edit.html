<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ad - OLXAds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body style="background:#f7f8fa;">

<div id="alertContainer"></div>

<nav class="olx-navbar navbar" style="padding:10px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span style="color:#ffce32;font-weight:900;font-size:1.5rem;letter-spacing:-1px;">OLX</span><span style="color:white;font-size:1.1rem;font-weight:600;">Ads</span>
        </a>
        <ul class="navbar-nav ms-auto flex-row gap-3 align-items-center">
            <li class="nav-item"><a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a></li>
            <li class="nav-item"><button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h2 style="font-weight:700;margin-bottom:20px;">
                <i class="bi bi-pencil me-2" style="color:#002f34;"></i>Edit Your Ad
            </h2>

            <form id="editAdForm">
                <input type="hidden" id="adId" th:value="${ad.id}">

                <!-- Basic Info -->
                <div style="background:white;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:16px;">
                    <div style="background:#f7f8fa;padding:14px 20px;border-bottom:1px solid #e0e0e0;">
                        <h6 style="margin:0;font-weight:700;">📝 Basic Information</h6>
                    </div>
                    <div style="padding:20px;">
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Ad Title *</label>
                            <input type="text" class="form-control" id="title" th:value="${ad.title}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Category *</label>
                            <select class="form-select" id="categoryId" required>
                                <option value="">Select a category</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.icon + ' ' + cat.name}"
                                        th:selected="${cat.id == ad.categoryId}">Category</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Description *</label>
                            <textarea class="form-control" id="description" rows="5" required th:text="${ad.description}"></textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">Condition</label>
                                <select class="form-select" id="condition">
                                    <option value="">Select condition</option>
                                    <option value="NEW" th:selected="${ad.condition != null and ad.condition.name() == 'NEW'}">✅ New</option>
                                    <option value="USED" th:selected="${ad.condition != null and ad.condition.name() == 'USED'}">🔄 Used</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">Price (₹) *</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" class="form-control" id="price" th:value="${ad.price}" required min="0" step="1">
                                </div>
                            </div>
                        </div>
                        <div class="form-check mt-3">
                            <input class="form-check-input" type="checkbox" id="negotiable" th:checked="${ad.negotiable}">
                            <label class="form-check-label" for="negotiable">Price is negotiable</label>
                        </div>
                    </div>
                </div>

                <!-- Location -->
                <div style="background:white;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:16px;">
                    <div style="background:#f7f8fa;padding:14px 20px;border-bottom:1px solid #e0e0e0;">
                        <h6 style="margin:0;font-weight:700;">📍 Location</h6>
                    </div>
                    <div style="padding:20px;">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">City</label>
                                <input type="text" class="form-control" id="city" th:value="${ad.location?.city}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">State</label>
                                <input type="text" class="form-control" id="state" th:value="${ad.location?.state}">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold">
                        <i class="bi bi-check-circle me-2"></i>Save Changes
                    </button>
                    <a th:href="@{/user/dashboard}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="olx-footer">
    <div class="container">
        <p class="footer-bottom text-center mb-0">&copy; 2024 OLXAds. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
document.getElementById('editAdForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const token = localStorage.getItem('jwt_token');
    if (!token) { window.location.href = '/auth/login'; return; }
    const btn = this.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving changes...';

    const adId = document.getElementById('adId').value;
    const data = {
        title: document.getElementById('title').value.trim(),
        description: document.getElementById('description').value.trim(),
        categoryId: document.getElementById('categoryId').value,
        price: parseFloat(document.getElementById('price').value),
        negotiable: document.getElementById('negotiable').checked,
        condition: document.getElementById('condition').value || null,
        city: document.getElementById('city').value.trim(),
        state: document.getElementById('state').value.trim()
    };

    try {
        const res = await fetch('/api/ads/' + adId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            showAlert('success', '✅ Ad updated successfully!');
            setTimeout(() => window.location.href = '/user/dashboard', 1500);
        } else {
            const err = await res.json();
            showAlert('danger', '❌ ' + (err.error || 'Failed to update ad. Please check all required fields.'));
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Save Changes';
        }
    } catch (err) {
        showAlert('danger', '⚠️ Connection error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Save Changes';
    }
});
</script>
</body>
</html>
