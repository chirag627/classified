<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Ad - OLXAds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body style="background:#f7f8fa;">

<div id="alertContainer"></div>

<nav class="olx-navbar navbar" style="padding:10px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span style="color:#ffce32;font-weight:900;font-size:1.5rem;letter-spacing:-1px;">OLX</span><span style="color:white;font-size:1.1rem;font-weight:600;">Ads</span>
        </a>
        <ul class="navbar-nav ms-auto flex-row gap-3 align-items-center">
            <li class="nav-item"><a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a></li>
            <li class="nav-item"><button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h2 style="font-weight:700;margin-bottom:20px;">
                <i class="bi bi-plus-circle me-2" style="color:#002f34;"></i>Post Your Ad
            </h2>

            <form id="createAdForm">
                <!-- Basic Info -->
                <div style="background:white;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:16px;">
                    <div style="background:#f7f8fa;padding:14px 20px;border-bottom:1px solid #e0e0e0;">
                        <h6 style="margin:0;font-weight:700;">📝 Basic Information</h6>
                    </div>
                    <div style="padding:20px;">
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Ad Title *</label>
                            <input type="text" class="form-control" id="title" required
                                   placeholder="e.g. iPhone 14 Pro Max 256GB - Excellent Condition"
                                   maxlength="100">
                            <small class="text-muted">Be specific and clear about what you're selling</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Category *</label>
                            <select class="form-select" id="categoryId" required>
                                <option value="">Select a category...</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}"
                                        th:text="${cat.icon + ' ' + cat.name}">Category</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Description *</label>
                            <textarea class="form-control" id="description" rows="5" required
                                      placeholder="Describe your item: brand, model, age, features, reason for selling..."></textarea>
                            <small class="text-muted">More details = more buyers!</small>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">Condition</label>
                                <select class="form-select" id="condition">
                                    <option value="">Select condition</option>
                                    <option value="NEW">✅ New</option>
                                    <option value="USED">🔄 Used</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">Price (₹) *</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" class="form-control" id="price" required
                                           min="0" step="1" placeholder="0">
                                </div>
                            </div>
                        </div>
                        <div class="form-check mt-3">
                            <input class="form-check-input" type="checkbox" id="negotiable">
                            <label class="form-check-label" for="negotiable" style="font-size:14px;">
                                Price is negotiable
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Images -->
                <div style="background:white;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:16px;">
                    <div style="background:#f7f8fa;padding:14px 20px;border-bottom:1px solid #e0e0e0;">
                        <h6 style="margin:0;font-weight:700;">📸 Photos <small style="font-weight:400;color:#888;">(Up to 5 images)</small></h6>
                    </div>
                    <div style="padding:20px;">
                        <label style="display:block;border:2px dashed #ccc;border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s;"
                               id="uploadArea">
                            <i class="bi bi-camera" style="font-size:2rem;color:#ccc;"></i>
                            <p style="margin:8px 0 4px;font-weight:600;color:#555;">Click to upload photos</p>
                            <p style="margin:0;font-size:12px;color:#aaa;">JPG, PNG up to 10MB each</p>
                            <input type="file" id="imageFiles" accept="image/*" multiple style="display:none;">
                        </label>
                        <div id="imagePreviewContainer" class="row g-2 mt-3"></div>
                    </div>
                </div>

                <!-- Location -->
                <div style="background:white;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:16px;">
                    <div style="background:#f7f8fa;padding:14px 20px;border-bottom:1px solid #e0e0e0;">
                        <h6 style="margin:0;font-weight:700;">📍 Location</h6>
                    </div>
                    <div style="padding:20px;">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">City</label>
                                <input type="text" class="form-control" id="city" placeholder="e.g. Mumbai">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="font-size:13px;">State</label>
                                <input type="text" class="form-control" id="state" placeholder="e.g. Maharashtra">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold" style="min-width:160px;">
                        <i class="bi bi-check-circle me-2"></i>Post Ad for FREE
                    </button>
                    <a th:href="@{/user/dashboard}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="olx-footer">
    <div class="container">
        <p class="footer-bottom text-center mb-0">&copy; 2024 OLXAds. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
// Upload area styling
document.getElementById('uploadArea').addEventListener('dragover', e => {
    e.preventDefault();
    e.currentTarget.style.borderColor = '#002f34';
});
document.getElementById('uploadArea').addEventListener('dragleave', e => {
    e.currentTarget.style.borderColor = '#ccc';
});
document.getElementById('uploadArea').addEventListener('drop', e => {
    e.preventDefault();
    e.currentTarget.style.borderColor = '#ccc';
    document.getElementById('imageFiles').files = e.dataTransfer.files;
    previewImages(e.dataTransfer.files, 'imagePreviewContainer');
});

document.getElementById('imageFiles').addEventListener('change', function() {
    previewImages(this.files, 'imagePreviewContainer');
});

document.getElementById('createAdForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const token = localStorage.getItem('jwt_token');
    if (!token) { window.location.href = '/auth/login'; return; }
    const btn = this.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Posting your ad...';

    // Upload images first
    const imageFiles = document.getElementById('imageFiles').files;
    let imagePaths = [];
    if (imageFiles.length > 0) {
        const formData = new FormData();
        for (let f of imageFiles) formData.append('files', f);
        try {
            const uploadRes = await fetch('/api/ads/upload-images', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            if (uploadRes.ok) {
                imagePaths = await uploadRes.json();
            } else {
                showAlert('warning', '⚠️ Image upload failed. Your ad will be posted without images.');
            }
        } catch (uploadErr) {
            showAlert('warning', '⚠️ Image upload failed. Posting without images.');
        }
    }

    const data = {
        title: document.getElementById('title').value.trim(),
        description: document.getElementById('description').value.trim(),
        categoryId: document.getElementById('categoryId').value,
        price: parseFloat(document.getElementById('price').value),
        negotiable: document.getElementById('negotiable').checked,
        condition: document.getElementById('condition').value || null,
        city: document.getElementById('city').value.trim(),
        state: document.getElementById('state').value.trim(),
        images: imagePaths
    };

    try {
        const res = await fetch('/api/ads', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            showAlert('success', '🎉 Ad posted successfully! It will be visible after review.');
            setTimeout(() => window.location.href = '/user/dashboard', 2000);
        } else {
            const err = await res.json();
            showAlert('danger', '❌ ' + (err.error || 'Failed to post ad. Please fill all required fields.'));
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Post Ad for FREE';
        }
    } catch (err) {
        showAlert('danger', '⚠️ Connection error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Post Ad for FREE';
    }
});
</script>
</body>
</html>
