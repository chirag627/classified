<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Oxxlo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body style="background:#f7f8fa;">

<nav class="olx-navbar navbar" style="padding:10px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span style="color:#ffce32;font-weight:900;font-size:1.5rem;letter-spacing:-1px;">Oxxlo</span>
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div style="background:white;border-radius:12px;border:1px solid #e0e0e0;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
                <div class="text-center mb-4">
                    <div style="width:56px;height:56px;background:#002f34;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
                        <i class="bi bi-phone-fill" style="color:#ffce32;font-size:1.5rem;"></i>
                    </div>
                    <h4 style="font-weight:700;margin-bottom:4px;">Welcome Back!</h4>
                    <p style="color:#888;font-size:14px;margin:0;">Sign in with your phone number</p>
                </div>

                <div id="alertContainer" style="position:static;min-width:unset;max-width:unset;"></div>

                <!-- Step 1: Enter phone -->
                <div id="step1">
                    <div class="mb-4">
                        <label class="form-label fw-semibold" style="font-size:13px;">Mobile Number</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:#f5f5f5;border-right:none;"><i class="bi bi-phone text-muted"></i></span>
                            <input type="tel" class="form-control" id="mobileNumber" required
                                   placeholder="Enter your mobile number" style="border-left:none;"
                                   onkeydown="if(event.key==='Enter') sendOtp();">
                        </div>
                    </div>
                    <button id="sendOtpBtn" onclick="sendOtp()" class="btn btn-primary w-100 fw-bold" style="height:44px;font-size:15px;">
                        <i class="bi bi-send me-2"></i>Send OTP
                    </button>
                </div>

                <!-- Step 2: Enter OTP (hidden initially) -->
                <div id="step2" style="display:none;">
                    <div class="text-center mb-3">
                        <i class="bi bi-shield-check" style="font-size:2rem;color:#002f34;"></i>
                        <p class="mt-2 mb-0" style="font-size:13px;color:#555;">OTP sent to <strong id="sentToNumber"></strong></p>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold" style="font-size:13px;">Enter OTP</label>
                        <input type="text" class="form-control text-center fw-bold" id="otpCode"
                               placeholder="• • • • • •" maxlength="6" style="font-size:1.4rem;letter-spacing:8px;"
                               onkeydown="if(event.key==='Enter') verifyOtp();">
                    </div>
                    <button id="verifyOtpBtn" onclick="verifyOtp()" class="btn btn-primary w-100 fw-bold mb-2" style="height:44px;font-size:15px;">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Verify & Sign In
                    </button>
                    <button onclick="goBack()" class="btn btn-link w-100 text-muted" style="font-size:13px;">
                        <i class="bi bi-arrow-left me-1"></i>Change number
                    </button>
                </div>

                <hr style="margin:20px 0;border-color:#f0f0f0;">
                <p class="text-center mb-0" style="font-size:14px;">
                    New to Oxxlo?
                    <a th:href="@{/auth/register}" style="color:#002f34;font-weight:700;text-decoration:none;">Create Account &rarr;</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
async function sendOtp() {
    const mobileNumber = document.getElementById('mobileNumber').value.trim();
    const countryCode = '91';
    if (!mobileNumber) {
        showAlert('warning', '⚠️ Please enter your mobile number.');
        return;
    }
    const btn = document.getElementById('sendOtpBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending OTP...';
    try {
        const res = await fetch('/api/auth/login/send-otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({mobileNumber, countryCode})
        });
        if (res.ok) {
            document.getElementById('sentToNumber').textContent = '+' + countryCode + ' ' + mobileNumber;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('alertContainer').innerHTML = '';
            setTimeout(() => document.getElementById('otpCode').focus(), 100);
        } else {
            const err = await res.json();
            showAlert('danger', '❌ ' + (err.error || err.message || 'Failed to send OTP.'));
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-send me-2"></i>Send OTP';
        }
    } catch (e) {
        showAlert('danger', '⚠️ Connection error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-send me-2"></i>Send OTP';
    }
}

async function verifyOtp() {
    const mobileNumber = document.getElementById('mobileNumber').value.trim();
    const countryCode = '91';
    const otpCode = document.getElementById('otpCode').value.trim();
    if (!otpCode) {
        showAlert('warning', '⚠️ Please enter the OTP.');
        return;
    }
    const btn = document.getElementById('verifyOtpBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verifying...';
    try {
        const res = await fetch('/api/auth/login/verify-otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({mobileNumber, countryCode, otpCode})
        });
        if (res.ok) {
            const result = await res.json();
            localStorage.setItem('jwt_token', result.token);
            localStorage.setItem('user_id', result.id);
            localStorage.setItem('user_name', result.name);
            localStorage.setItem('user_roles', JSON.stringify(result.roles));
            document.cookie = "JWT_TOKEN=" + result.token + "; path=/; SameSite=Strict";
            showAlert('success', '✅ Login successful! Redirecting...');
            setTimeout(() => {
                const roles = result.roles || [];
                window.location.href = roles.includes('ADMIN') ? '/admin/dashboard' : '/user/dashboard';
            }, 1000);
        } else {
            const err = await res.json();
            showAlert('danger', '❌ ' + (err.error || err.message || 'Invalid OTP. Please try again.'));
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Verify & Sign In';
        }
    } catch (e) {
        showAlert('danger', '⚠️ Connection error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Verify & Sign In';
    }
}

function goBack() {
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step1').style.display = 'block';
    document.getElementById('otpCode').value = '';
    document.getElementById('alertContainer').innerHTML = '';
    const btn = document.getElementById('sendOtpBtn');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-send me-2"></i>Send OTP';
}
</script>
</body>
</html>
