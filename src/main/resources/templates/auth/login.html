<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OLXAds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body style="background:#f7f8fa;">

<nav class="olx-navbar navbar" style="padding:10px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span style="color:#ffce32;font-weight:900;font-size:1.5rem;letter-spacing:-1px;">OLX</span><span style="color:white;font-size:1.1rem;font-weight:600;">Ads</span>
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div style="background:white;border-radius:12px;border:1px solid #e0e0e0;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
                <div class="text-center mb-4">
                    <div style="width:56px;height:56px;background:#002f34;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
                        <i class="bi bi-person-fill" style="color:#ffce32;font-size:1.5rem;"></i>
                    </div>
                    <h4 style="font-weight:700;margin-bottom:4px;">Welcome Back!</h4>
                    <p style="color:#888;font-size:14px;margin:0;">Sign in to your OLXAds account</p>
                </div>

                <div id="alertContainer" style="position:static;min-width:unset;max-width:unset;"></div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="font-size:13px;">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:#f5f5f5;border-right:none;"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control" id="email" required
                                   placeholder="your@email.com" style="border-left:none;">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold" style="font-size:13px;">Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:#f5f5f5;border-right:none;"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control" id="password" required
                                   placeholder="Enter your password" style="border-left:none;">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold" style="height:44px;font-size:15px;">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>

                <hr style="margin:20px 0;border-color:#f0f0f0;">

                <p class="text-center mb-3" style="font-size:14px;">
                    New to OLXAds?
                    <a th:href="@{/auth/register}" style="color:#002f34;font-weight:700;text-decoration:none;">Create Account &rarr;</a>
                </p>

                <div style="background:#fffbea;border:1px solid #ffce32;border-radius:8px;padding:12px;">
                    <p style="font-size:12px;color:#666;margin:0;"><strong style="color:#002f34;">Demo Credentials:</strong><br>
                        🛡️ Admin: admin@classified.com / admin123<br>
                        👤 User: alice@example.com / password123
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
    const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            const result = await res.json();
            localStorage.setItem('jwt_token', result.token);
            localStorage.setItem('user_id', result.id);
            localStorage.setItem('user_name', result.name);
            localStorage.setItem('user_roles', JSON.stringify(result.roles));
            document.cookie = "JWT_TOKEN=" + result.token + "; path=/; SameSite=Strict";
            showAlert('success', '✅ Login successful! Redirecting you now...');
            const roles = result.roles;
            setTimeout(() => {
                if (roles && roles.includes('ADMIN')) {
                    window.location.href = '/admin/dashboard';
                } else {
                    window.location.href = '/user/dashboard';
                }
            }, 1200);
        } else {
            const err = await res.json();
            showAlert('danger', '❌ ' + (err.error || 'Invalid email or password. Please try again.'));
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
        }
    } catch (err) {
        showAlert('danger', '⚠️ Connection error. Please check your internet and try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
    }
});
</script>
</body>
</html>
