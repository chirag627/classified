<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - OLXAds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body style="background:#f7f8fa;">

<nav class="olx-navbar navbar" style="padding:10px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span style="color:#ffce32;font-weight:900;font-size:1.5rem;letter-spacing:-1px;">OLX</span><span style="color:white;font-size:1.1rem;font-weight:600;">Ads</span>
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div style="background:white;border-radius:12px;border:1px solid #e0e0e0;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
                <div class="text-center mb-4">
                    <div style="width:56px;height:56px;background:#002f34;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
                        <i class="bi bi-person-plus-fill" style="color:#ffce32;font-size:1.4rem;"></i>
                    </div>
                    <h4 style="font-weight:700;margin-bottom:4px;">Create Your Account</h4>
                    <p style="color:#888;font-size:14px;margin:0;">Join millions of buyers and sellers on OLXAds</p>
                </div>

                <div id="alertContainer" style="position:static;min-width:unset;max-width:unset;"></div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="font-size:13px;">Full Name *</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:#f5f5f5;border-right:none;"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control" id="name" required placeholder="John Doe" style="border-left:none;">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="font-size:13px;">Email Address *</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:#f5f5f5;border-right:none;"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control" id="email" required placeholder="your@email.com" style="border-left:none;">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="font-size:13px;">Password * <small class="text-muted fw-normal">(min. 6 characters)</small></label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:#f5f5f5;border-right:none;"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control" id="password" required
                                   placeholder="Create a strong password" style="border-left:none;">
                        </div>
                    </div>
                    <div class="row g-2">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">Phone</label>
                            <input type="tel" class="form-control" id="phone" placeholder="555-0123">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold" style="font-size:13px;">City</label>
                            <input type="text" class="form-control" id="city" placeholder="Mumbai">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold" style="font-size:13px;">State</label>
                        <input type="text" class="form-control" id="state" placeholder="Maharashtra">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold" style="height:44px;font-size:15px;">
                        <i class="bi bi-person-check me-2"></i>Create Account for FREE
                    </button>
                </form>

                <hr style="margin:20px 0;border-color:#f0f0f0;">
                <p class="text-center mb-0" style="font-size:14px;">
                    Already have an account?
                    <a th:href="@{/auth/login}" style="color:#002f34;font-weight:700;text-decoration:none;">Sign In &rarr;</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type=submit]');
    const password = document.getElementById('password').value;
    if (password.length < 6) {
        showAlert('warning', '⚠️ Password must be at least 6 characters long.');
        return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';
    const data = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: password,
        phone: document.getElementById('phone').value.trim(),
        city: document.getElementById('city').value.trim(),
        state: document.getElementById('state').value.trim()
    };
    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            showAlert('success', '🎉 Account created successfully! Redirecting to login...');
            setTimeout(() => window.location.href = '/auth/login', 1800);
        } else {
            const err = await res.json();
            showAlert('danger', '❌ ' + (err.error || 'Registration failed. Please try again.'));
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-person-check me-2"></i>Create Account for FREE';
        }
    } catch (err) {
        showAlert('danger', '⚠️ Connection error. Please check your internet and try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-check me-2"></i>Create Account for FREE';
    }
});
</script>
</body>
</html>
