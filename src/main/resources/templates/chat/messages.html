<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - ClassifiedAds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-grid-3x3-gap-fill me-2"></i>ClassifiedAds</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a></li>
            <li class="nav-item"><button class="btn btn-outline-light btn-sm ms-1" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <h3 class="mb-4"><i class="bi bi-chat-dots me-2"></i>Messages</h3>

    <div class="row">
        <!-- Conversations List -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-header"><h6 class="mb-0">Conversations</h6></div>
                <div class="list-group list-group-flush" id="conversationsList">
                    <div class="text-center py-4">
                        <div class="spinner-border spinner-border-sm text-primary"></div>
                        <p class="small mt-2 text-muted">Loading...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Window -->
        <div class="col-md-8">
            <div class="card" id="chatWindow" style="display: none;">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0" id="chatPartnerName">Select a conversation</h6>
                </div>
                <div class="card-body" id="messagesContainer" style="height: 400px; overflow-y: auto;">
                </div>
                <div class="card-footer">
                    <div class="input-group">
                        <input type="text" class="form-control" id="messageInput" placeholder="Type a message...">
                        <button class="btn btn-primary" id="sendMessageBtn">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div id="emptyChat" class="text-center py-5">
                <i class="bi bi-chat display-4 text-muted"></i>
                <p class="text-muted mt-3">Select a conversation to start chatting</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
let currentPartnerId = null;
const currentUserId = localStorage.getItem('user_id');

async function loadConversations() {
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/messages', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return;
    const messages = await res.json();
    const partners = new Map();
    messages.forEach(m => {
        const partnerId = m.senderId === currentUserId ? m.receiverId : m.senderId;
        const partnerName = m.senderId === currentUserId ? m.receiverName : m.senderName;
        if (!partners.has(partnerId)) {
            partners.set(partnerId, { id: partnerId, name: partnerName, lastMessage: m.content });
        }
    });
    const container = document.getElementById('conversationsList');
    if (partners.size === 0) {
        container.innerHTML = '<div class="text-center py-4 text-muted small">No conversations yet</div>';
        return;
    }
    container.innerHTML = '';
    partners.forEach((p, id) => {
        const item = document.createElement('a');
        item.href = '#';
        item.className = 'list-group-item list-group-item-action';
        item.innerHTML = `<div class="d-flex"><div><strong>${p.name}</strong><br><small class="text-muted">${p.lastMessage.substring(0, 30)}...</small></div></div>`;
        item.addEventListener('click', e => { e.preventDefault(); openConversation(p.id, p.name); });
        container.appendChild(item);
    });
}

async function openConversation(partnerId, partnerName) {
    currentPartnerId = partnerId;
    document.getElementById('chatPartnerName').textContent = partnerName;
    document.getElementById('chatWindow').style.display = 'block';
    document.getElementById('emptyChat').style.display = 'none';
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/messages/conversation/' + partnerId, { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return;
    const messages = await res.json();
    const container = document.getElementById('messagesContainer');
    container.innerHTML = messages.length === 0 ? '<p class="text-center text-muted">No messages yet</p>' : '';
    messages.reverse().forEach(m => {
        const isOwn = m.senderId === currentUserId;
        const div = document.createElement('div');
        div.className = 'd-flex mb-2 ' + (isOwn ? 'justify-content-end' : '');
        div.innerHTML = `<div class="p-2 rounded ${isOwn ? 'bg-primary text-white' : 'bg-light'}" style="max-width:70%">
            <small class="d-block ${isOwn ? 'text-white-50' : 'text-muted'}">${isOwn ? 'You' : m.senderName}</small>
            ${m.content}
        </div>`;
        container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
}

document.getElementById('sendMessageBtn').addEventListener('click', async function() {
    if (!currentPartnerId) return;
    const content = document.getElementById('messageInput').value.trim();
    if (!content) return;
    const token = localStorage.getItem('jwt_token');
    const res = await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ receiverId: currentPartnerId, adId: 'general', content })
    });
    if (res.ok) {
        document.getElementById('messageInput').value = '';
        openConversation(currentPartnerId, document.getElementById('chatPartnerName').textContent);
    }
});

document.getElementById('messageInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('sendMessageBtn').click();
});

loadConversations();
</script>
</body>
</html>
