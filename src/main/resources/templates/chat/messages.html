<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Oxxlo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body style="background:#f7f8fa;">

<div id="alertContainer"></div>

<nav class="olx-navbar navbar" style="padding:10px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span style="color:#ffce32;font-weight:900;font-size:1.5rem;letter-spacing:-1px;">Oxxlo</span>
        </a>
        <ul class="navbar-nav ms-auto flex-row gap-3 align-items-center">
            <li class="nav-item"><a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a></li>
            <li class="nav-item"><button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <h3 style="font-weight:700;margin-bottom:20px;"><i class="bi bi-chat-dots me-2" style="color:#002f34;"></i>Messages</h3>

    <div class="row g-3" style="height:calc(100vh - 200px);min-height:500px;">
        <!-- Conversations List -->
        <div class="col-md-4">
            <div style="background:white;border-radius:10px;border:1px solid #e0e0e0;height:100%;overflow:hidden;display:flex;flex-direction:column;">
                <div style="padding:14px 16px;border-bottom:1px solid #f0f0f0;font-weight:700;font-size:14px;">
                    💬 Conversations
                </div>
                <div class="list-group list-group-flush flex-grow-1 overflow-auto" id="conversationsList">
                    <div style="text-align:center;padding:32px;color:#888;">
                        <div class="spinner-border spinner-border-sm text-primary mb-2"></div>
                        <p class="small mb-0">Loading conversations...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Window -->
        <div class="col-md-8" style="display:flex;flex-direction:column;">
            <div style="background:white;border-radius:10px;border:1px solid #e0e0e0;height:100%;display:flex;flex-direction:column;" id="chatWindow">
                <!-- Header -->
                <div style="padding:14px 16px;border-bottom:1px solid #f0f0f0;font-weight:700;display:flex;align-items:center;gap:10px;" id="chatWindowHeader" class="d-none">
                    <div style="width:36px;height:36px;background:#e8ecee;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#666;">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <span id="chatPartnerName">Select a conversation</span>
                </div>

                <!-- Empty State -->
                <div id="emptyChat" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#aaa;text-align:center;padding:32px;">
                    <i class="bi bi-chat" style="font-size:3rem;margin-bottom:12px;"></i>
                    <p style="font-weight:600;margin-bottom:4px;">No conversation selected</p>
                    <p style="font-size:13px;margin:0;">Pick a conversation from the left to start chatting</p>
                </div>

                <!-- Messages Container -->
                <div id="messagesContainer" class="d-none flex-grow-1 overflow-auto" style="padding:16px;background:#f9fafb;">
                </div>

                <!-- Message Input -->
                <div id="messageInputArea" class="d-none" style="padding:12px 16px;border-top:1px solid #f0f0f0;background:white;">
                    <div class="input-group">
                        <input type="text" class="form-control" id="messageInput"
                               placeholder="Type your message..." style="border-radius:20px 0 0 20px;">
                        <button class="btn btn-primary" id="sendMessageBtn" style="border-radius:0 20px 20px 0;">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
let currentPartnerId = null;
const currentUserId = localStorage.getItem('user_id');

async function loadConversations() {
    const token = localStorage.getItem('jwt_token');
    if (!token) { window.location.href = '/auth/login'; return; }
    try {
        const res = await fetch('/api/messages', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!res.ok) {
            document.getElementById('conversationsList').innerHTML = '<div style="text-align:center;padding:24px;color:#dc3545;font-size:13px;">❌ Failed to load conversations</div>';
            return;
        }
        const messages = await res.json();
        const partners = new Map();
        messages.forEach(m => {
            const partnerId = m.senderId === currentUserId ? m.receiverId : m.senderId;
            const partnerName = m.senderId === currentUserId ? m.receiverName : m.senderName;
            if (!partners.has(partnerId)) {
                partners.set(partnerId, { id: partnerId, name: partnerName, lastMessage: m.content });
            }
        });
        const container = document.getElementById('conversationsList');
        if (partners.size === 0) {
            container.innerHTML = '<div style="text-align:center;padding:32px;color:#aaa;font-size:13px;"><i class="bi bi-chat" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No conversations yet</div>';
            return;
        }
        container.innerHTML = '';
        partners.forEach((p, id) => {
            const item = document.createElement('a');
            item.href = '#';
            item.className = 'list-group-item list-group-item-action';
            item.style.cssText = 'padding:12px 16px;border:none;border-bottom:1px solid #f5f5f5;';
            const truncated = p.lastMessage ? p.lastMessage.substring(0, 35) + (p.lastMessage.length > 35 ? '...' : '') : '';
            item.innerHTML = `
                <div class="d-flex align-items-center gap-2">
                    <div style="width:40px;height:40px;background:#e8ecee;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#666;">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <div style="flex:1;min-width:0;">
                        <div style="font-weight:600;font-size:14px;">${p.name || 'Unknown'}</div>
                        <div style="font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${truncated || 'Start a conversation'}</div>
                    </div>
                </div>`;
            item.addEventListener('click', e => { e.preventDefault(); openConversation(p.id, p.name); });
            container.appendChild(item);
        });
    } catch (e) {
        document.getElementById('conversationsList').innerHTML = '<div style="text-align:center;padding:24px;color:#dc3545;font-size:13px;">⚠️ Connection error</div>';
    }
}

async function openConversation(partnerId, partnerName) {
    currentPartnerId = partnerId;
    document.getElementById('chatPartnerName').textContent = partnerName || 'User';
    document.getElementById('chatWindowHeader').classList.remove('d-none');
    document.getElementById('emptyChat').style.display = 'none';
    document.getElementById('messagesContainer').classList.remove('d-none');
    document.getElementById('messageInputArea').classList.remove('d-none');

    const token = localStorage.getItem('jwt_token');
    try {
        const res = await fetch('/api/messages/conversation/' + partnerId, { headers: { 'Authorization': 'Bearer ' + token } });
        if (!res.ok) { showAlert('danger', '❌ Failed to load messages.'); return; }
        const messages = await res.json();
        const container = document.getElementById('messagesContainer');
        if (messages.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#aaa;font-size:13px;padding:24px;">No messages yet. Say hello! 👋</p>';
        } else {
            container.innerHTML = '';
            messages.reverse().forEach(m => {
                const isOwn = m.senderId === currentUserId;
                const div = document.createElement('div');
                div.style.cssText = 'display:flex;margin-bottom:12px;' + (isOwn ? 'justify-content:flex-end;' : '');
                div.innerHTML = `<div class="${isOwn ? 'chat-bubble-own' : 'chat-bubble-other'}">
                    <div style="font-size:11px;${isOwn ? 'color:rgba(255,255,255,0.7)' : 'color:#888'};margin-bottom:3px;">${isOwn ? 'You' : m.senderName}</div>
                    ${m.content}
                </div>`;
                container.appendChild(div);
            });
        }
        container.scrollTop = container.scrollHeight;
        // Mark as read
        fetch('/api/messages/read/' + partnerId, { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } });
    } catch (e) {
        showAlert('danger', '⚠️ Connection error loading messages.');
    }
}

document.getElementById('sendMessageBtn').addEventListener('click', async function() {
    if (!currentPartnerId) { showAlert('info', '💡 Select a conversation first.'); return; }
    const content = document.getElementById('messageInput').value.trim();
    if (!content) { return; }
    const token = localStorage.getItem('jwt_token');
    try {
        const res = await fetch('/api/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ receiverId: currentPartnerId, adId: 'general', content })
        });
        if (res.ok) {
            document.getElementById('messageInput').value = '';
            openConversation(currentPartnerId, document.getElementById('chatPartnerName').textContent);
        } else {
            showAlert('danger', '❌ Failed to send message. Please try again.');
        }
    } catch (e) {
        showAlert('danger', '⚠️ Connection error. Could not send message.');
    }
});

document.getElementById('messageInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('sendMessageBtn').click();
});

loadConversations();
</script>
</body>
</html>
