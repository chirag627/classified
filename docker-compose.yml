version: '3.8'

services:
  app:
    build: .
    container_name: classified-app
    ports:
      - "3000:8080"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/classified
      - JWT_SECRET=classified-app-super-secret-key-must-be-at-least-256-bits-long-for-hs256
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongo
    networks:
      - classified-network
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: classified-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - classified-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0.2
    container_name: classified-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongo
    networks:
      - classified-network
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data:

networks:
  classified-network:
    driver: bridge
